name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$HOME/.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$HOME/.keystore/release.keystore"
          test -s "$HOME/.keystore/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/../release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_ACTOR: ${{ secrets.GPR_USER }}
          GITHUB_TOKEN: ${{ secrets.GPR_KEY }}
        run: |
          export KEYSTORE_FILE="$HOME/.keystore/release.keystore"
          ./gradlew :app:assembleRelease

      - name: Rename APK with version
        id: rename
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC=app/build/outputs/apk/release/app-release.apk
          DST="app/build/outputs/apk/release/karoo-garage-${VERSION}.apk"
          mv "$SRC" "$DST"
          echo "apk=$DST" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        run: |
          ANDROID_HOME="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
          "${BUILD_TOOLS}apksigner" verify --verbose "${{ steps.rename.outputs.apk }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.rename.outputs.apk }}
          generate_release_notes: true
          fail_on_unmatched_files: true
